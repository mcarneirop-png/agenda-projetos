<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Agenda de Projetos</title>
<style>
  :root{
    color-scheme: light;
    --bg:#f7f8fa; --card:#ffffff; --text:#1a1d21; --muted:#6b7280;
    --line:#e7e9ee; --done:#10b981; --danger:#ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:860px;margin:0 auto;padding:32px 18px 80px}
  h1{font-size:26px;font-weight:700;letter-spacing:-0.02em}
  .sub{color:var(--muted);margin-top:5px;font-size:14px}

  .overall{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 20px;margin-top:20px;display:flex;align-items:center;gap:16px}
  .overall .label{font-size:13px;color:var(--muted)}
  .overall .pct{font-size:20px;font-weight:700}

  .addbar{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-top:16px;display:flex;gap:8px;flex-wrap:wrap}
  .addbar input[type=text]{flex:1 1 240px;min-width:0;border:1px solid var(--line);border-radius:9px;
    padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:#fff}
  .addbar select{border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;
    font-family:inherit;background:#fff;color:var(--text);cursor:pointer}
  .addbar button{border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600;
    background:var(--text);color:#fff;cursor:pointer}
  .addbar button:hover{opacity:.9}
  .addbar input:focus,.addbar select:focus{outline:2px solid #c7d2fe;outline-offset:0}

  .project{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:20px;margin-top:16px}
  .ph{display:flex;align-items:center;gap:11px;margin-bottom:4px}
  .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .ph h2{font-size:17px;font-weight:650}
  .ph .count{margin-left:auto;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin:12px 0 14px}
  .bar>span{display:block;height:100%;border-radius:99px;transition:width .35s ease}

  ul{list-style:none}
  li{display:flex;align-items:flex-start;gap:11px;padding:9px 8px;border-radius:9px;transition:background .15s}
  li:hover{background:var(--bg)}
  li:hover .del{opacity:1}
  .box{width:20px;height:20px;border:2px solid var(--line);border-radius:6px;flex-shrink:0;margin-top:1px;
    display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
  .box svg{width:12px;height:12px;opacity:0;transform:scale(.5);transition:all .15s}
  li.done .box{background:var(--done);border-color:var(--done)}
  li.done .box svg{opacity:1;transform:scale(1)}
  .txt{font-size:14.5px;flex:1;cursor:pointer}
  li.done .txt{color:var(--muted);text-decoration:line-through}
  .tag{font-size:10.5px;font-weight:600;color:var(--muted);border:1px solid var(--line);
    border-radius:5px;padding:1px 6px;margin-left:2px;white-space:nowrap}
  .del{opacity:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;
    line-height:1;padding:2px 4px;transition:opacity .15s;flex-shrink:0}
  .del:hover{color:var(--danger)}
  .empty{color:var(--muted);font-size:13.5px;padding:8px;font-style:italic}

  footer{margin-top:34px;text-align:center;color:var(--muted);font-size:12.5px}
  .reset{background:none;border:1px solid var(--line);color:var(--muted);padding:6px 13px;
    border-radius:8px;cursor:pointer;font-size:12.5px;margin-top:10px}
  .reset:hover{background:var(--card);color:var(--text)}
  .loading{color:var(--muted);text-align:center;padding:40px;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Minha Agenda de Projetos</h1>
  <p class="sub">Adicione ações, marque o que concluiu. Os to-dos que você menciona nas conversas entram sozinhos no projeto certo, todo dia.</p>

  <div class="overall">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="23" fill="none" stroke="var(--line)" stroke-width="7"/>
      <circle id="ringFill" cx="28" cy="28" r="23" fill="none" stroke="var(--done)" stroke-width="7"
        stroke-linecap="round" stroke-dasharray="144.5" stroke-dashoffset="144.5"
        transform="rotate(-90 28 28)" style="transition:stroke-dashoffset .4s ease"/>
    </svg>
    <div>
      <div class="label">Progresso geral</div>
      <div class="pct"><span id="overallPct">0</span>%</div>
    </div>
  </div>

  <div class="addbar">
    <input type="text" id="newTask" placeholder="Escreva uma nova ação...">
    <select id="newProject"></select>
    <button id="addBtn">Inserir</button>
  </div>

  <main id="board"><div class="loading">Carregando…</div></main>

  <footer>
    <div>Sincroniza com nossas conversas. Última sync de to-dos: <span id="syncDate">—</span></div>
    <button class="reset" id="resetBtn">Limpar todas as marcações</button>
  </footer>
</div>

<script>
const DATA_URL = "tasks.json";          // arquivo atualizado diariamente via git
const KEY = "agenda_projetos_v2";
const checkSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

let PROJECTS = [];
let SYNCED = [];
let SYNC_DATE = "—";

let state = load();
state.completed = state.completed || {};
state.manual    = state.manual    || [];
state.removed   = state.removed   || {};

function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ return {}; } }
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function init(){
  try{
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    const data = await res.json();
    PROJECTS = data.projects || [];
    SYNCED   = data.tasks || [];
    SYNC_DATE = data.syncDate || "—";
  }catch(e){
    document.getElementById("board").innerHTML =
      '<div class="loading">Não consegui carregar as tarefas (tasks.json). Verifique a publicação.</div>';
    return;
  }
  const sel = document.getElementById("newProject");
  sel.innerHTML = PROJECTS.map(p=>`<option value="${p.id}">${p.name}</option>`).join("");
  document.getElementById("syncDate").textContent = SYNC_DATE;
  document.getElementById("addBtn").onclick = addTask;
  document.getElementById("newTask").addEventListener("keydown", e=>{ if(e.key==="Enter") addTask(); });
  document.getElementById("resetBtn").onclick = resetAll;
  render();
}

function tasksFor(pid){
  const synced = SYNCED.filter(t=>t.project===pid && !state.removed[t.id]);
  const manual = state.manual.filter(t=>t.project===pid);
  return [...synced, ...manual];
}

function render(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  let totalAll=0, doneAll=0;

  PROJECTS.forEach(p=>{
    const tasks = tasksFor(p.id);
    const done = tasks.filter(t=>state.completed[t.id]).length;
    totalAll += tasks.length; doneAll += done;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;

    const sec = document.createElement("section");
    sec.className = "project";
    sec.innerHTML = `
      <div class="ph">
        <span class="dot" style="background:${p.color}"></span>
        <h2>${escapeHtml(p.name)}</h2>
        <span class="count">${done}/${tasks.length}</span>
      </div>
      <div class="bar"><span style="width:${pct}%;background:${p.color}"></span></div>
      <ul></ul>`;
    const ul = sec.querySelector("ul");

    if(tasks.length===0){
      const li=document.createElement("li");
      li.innerHTML='<span class="empty">Nenhuma ação ainda. Adicione acima.</span>';
      ul.appendChild(li);
    }
    tasks.forEach(t=>{
      const li=document.createElement("li");
      const checked=!!state.completed[t.id];
      const isManual = state.manual.some(m=>m.id===t.id);
      if(checked) li.className="done";
      li.innerHTML = `
        <span class="box">${checkSVG}</span>
        <span class="txt">${escapeHtml(t.text)}</span>
        ${isManual ? '<span class="tag">manual</span>' : ''}
        <button class="del" title="Remover">×</button>`;
      li.querySelector(".box").onclick = li.querySelector(".txt").onclick = ()=>{
        state.completed[t.id] = !state.completed[t.id]; save(); render();
      };
      li.querySelector(".del").onclick = (e)=>{ e.stopPropagation(); removeTask(t.id); };
      ul.appendChild(li);
    });
    board.appendChild(sec);
  });

  const overall = totalAll ? Math.round(doneAll/totalAll*100) : 0;
  document.getElementById("overallPct").textContent = overall;
  document.getElementById("ringFill").style.strokeDashoffset = 144.5 - (144.5*overall/100);
}

function addTask(){
  const inp = document.getElementById("newTask");
  const txt = inp.value.trim();
  if(!txt) return;
  const project = document.getElementById("newProject").value;
  state.manual.push({ id:"u_"+Date.now()+"_"+Math.random().toString(36).slice(2,6), project, text:txt });
  save(); inp.value=""; inp.focus(); render();
}

function removeTask(id){
  if(state.manual.some(m=>m.id===id)){
    state.manual = state.manual.filter(m=>m.id!==id);
  } else {
    state.removed[id] = true;
  }
  delete state.completed[id];
  save(); render();
}

function resetAll(){
  if(confirm("Limpar todas as marcações de concluído?")){
    state.completed = {}; save(); render();
  }
}

init();
</script>
</body>
</html>
